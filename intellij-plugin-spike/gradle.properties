pluginSinceBuild=261
pluginUntilBuild=261.*
javaVersion=25

# The IDE bundles the Kotlin stdlib at runtime — don't add/bundle our own (it
# would conflict with the platform's). Plugin code compiles against the
# platform-provided stdlib.
kotlin.stdlib.default.dependency=false

# JDK 25 toolchain. Gradle auto-detects from /Library/Java, /opt/homebrew,
# SDKMAN, etc. If auto-detect fails on your machine, add
# `org.gradle.java.installations.paths=/path/to/your/jdk25`
# to your ~/.gradle/gradle.properties (user-scoped, not committed).
